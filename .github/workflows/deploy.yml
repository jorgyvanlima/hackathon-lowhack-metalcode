name: Deploy Hackathon to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup SSH (manual)
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy na VM Google Cloud
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.SSH_PATH }}
            echo "Pulling latest changes"
            git pull origin main || true

            # Instalar Docker se não existir
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker não encontrado. Instalando..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # Instalar plugin docker compose se necessário
            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose (plugin) não encontrado. Instalando..."
              sudo apt-get install -y docker-compose-plugin || true
            fi

            # Build e subir containers
            echo "Executando docker compose up -d --build"
            sudo docker compose up -d --build
          EOF
