name: Deploy Hackathon to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Deploy via SSH (appleboy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.SSH_PATH }}
            echo "Pulling latest changes"
            git pull origin main || true

            # Instalar Docker se não existir
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker não encontrado. Instalando..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # Instalar plugin docker compose se necessário
            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose (plugin) não encontrado. Instalando..."
              sudo apt-get install -y docker-compose-plugin || true
            fi

            echo "Executando docker compose up -d --build"
            sudo docker compose up -d --build
